name: Publish threadline-mcp

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/threadline-mcp/**'

concurrency:
  group: publish-threadline-mcp
  cancel-in-progress: false

jobs:
  publish:
    name: Publish threadline-mcp
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/threadline-mcp
        run: npm ci

      - name: Build
        working-directory: packages/threadline-mcp
        run: npm run build

      - name: Check if version changed
        id: check
        working-directory: packages/threadline-mcp
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view threadline-mcp version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            npm version patch --no-git-tag-version
            NEW=$(node -p "require('./package.json').version")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "Bumped $LOCAL → $NEW"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "Already at $LOCAL (remote: $REMOTE)"
          fi

      - name: Publish to npm
        working-directory: packages/threadline-mcp
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: steps.check.outputs.bumped == 'true'
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/threadline-mcp/package.json packages/threadline-mcp/package-lock.json
          git commit -m "chore: release threadline-mcp v${{ steps.check.outputs.version }} [skip ci]"
          git push origin main
