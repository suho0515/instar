# Threadline Relay — Fly.io deployment config
# Deploy: fly deploy

app = "threadline-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.relay"

[env]
  RELAY_PORT = "8787"
  RELAY_HOST = "0.0.0.0"
  RELAY_ADMIN_PORT = "9091"
  RELAY_DATA_DIR = "/data"

# RELAY_ADMIN_KEY set via: fly secrets set RELAY_ADMIN_KEY=<key>

# WebSocket relay on ports 80/443 -> internal 8787
# Fly's HTTP handler supports WebSocket upgrade automatically
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1  # Single instance — relay state is in-memory

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[mounts]
  source = "threadline_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
